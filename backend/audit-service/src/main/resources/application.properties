spring.application.name=audit-service
server.port=8086

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/cryptovault
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:@tharv23}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Open-In-View Settings
spring.jpa.open-in-view=false

# Observability Actuator configurations
management.endpoints.web.exposure.include=prometheus,health,info

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/api/audit/v3/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.showOperationIds=true

