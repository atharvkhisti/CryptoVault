spring.application.name=kyc-service
server.port=8087

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/cryptovault
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:@tharv23}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Open-In-View Settings
spring.jpa.open-in-view=false

# Observability Actuator configurations
management.endpoints.web.exposure.include=prometheus,health,info

# File Upload Multipart Limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Storage configuration
kyc.storage.local.dir=./uploads

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/api/kyc/v3/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.showOperationIds=true

