spring.application.name=transaction-service
server.port=8082

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/cryptovault
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:@tharv23}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Open-In-View Settings
spring.jpa.open-in-view=false

application.client.wallet-service.url=http://${WALLET_SERVICE_HOST:localhost}:8081

# JWT Secret Key
application.security.jwt.secret-key=Y29uZmlndXJhYmxlc2VjcmV0a2V5Zm9yY3J5cHRvdmF1bHRhdXRoc2VydmljZWJhc2U2NA==

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/api/transactions/v3/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.showOperationIds=true


# Actuator Health Endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

