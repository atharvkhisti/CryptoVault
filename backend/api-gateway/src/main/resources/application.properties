spring.application.name=api-gateway
server.port=8080

# JWT Configuration
# Shared secret key (Base64-encoded) for validating signatures issued by auth-service
application.security.jwt.secret-key=Y29uZmlndXJhYmxlc2VjcmV0a2V5Zm9yY3J5cHRvdmF1bHRhdXRoc2VydmljZWJhc2U2NA==

# Service URL Routing Configuration
services.auth.url=http://${AUTH_SERVICE_HOST:localhost}:8083
services.wallet.url=http://${WALLET_SERVICE_HOST:localhost}:8081
services.transaction.url=http://${TRANSACTION_SERVICE_HOST:localhost}:8082

# Future Microservices placeholders
services.notification.url=http://${NOTIFICATION_SERVICE_HOST:localhost}:8084
services.risk.url=http://${RISK_SERVICE_HOST:localhost}:8085
services.audit.url=http://${AUDIT_SERVICE_HOST:localhost}:8086
services.kyc.url=http://${KYC_SERVICE_HOST:localhost}:8087

# SpringDoc OpenAPI Gateway Aggregator Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# Swagger UI Customizations
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.showOperationIds=true

# Downstream Microservices spec urls to aggregate
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/api/auth/v3/api-docs
springdoc.swagger-ui.urls[1].name=Wallet Service
springdoc.swagger-ui.urls[1].url=/api/wallets/v3/api-docs
springdoc.swagger-ui.urls[2].name=Transaction Service
springdoc.swagger-ui.urls[2].url=/api/transactions/v3/api-docs
springdoc.swagger-ui.urls[3].name=Notification Service
springdoc.swagger-ui.urls[3].url=/api/notifications/v3/api-docs
springdoc.swagger-ui.urls[4].name=Risk Service
springdoc.swagger-ui.urls[4].url=/api/risk/v3/api-docs
springdoc.swagger-ui.urls[5].name=Audit Service
springdoc.swagger-ui.urls[5].url=/api/audit/v3/api-docs
springdoc.swagger-ui.urls[6].name=KYC Service
springdoc.swagger-ui.urls[6].url=/api/kyc/v3/api-docs


# Actuator Health Endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

