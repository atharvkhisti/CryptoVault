spring.application.name=notification-service
server.port=8084

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/cryptovault
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:@tharv23}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Spring Mail configurations (for template-based MIME triggers)
spring.mail.host=smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=dummy_user
spring.mail.password=dummy_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Sender configuration
application.mail.from=no-reply@cryptovault.com

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/api/notifications/v3/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.showOperationIds=true


# Actuator Health Endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

