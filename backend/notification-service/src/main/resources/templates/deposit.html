<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Deposit Successful</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h2 style="color: #27ae60;">Deposit Confirmed!</h2>
        <p style="color: #666666;">Your deposit request has been completed successfully.</p>
        <table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
            <tr>
                <td style="padding: 8px; border-bottom: 1px solid #eeeeee; font-weight: bold; color: #333333;">Amount:</td>
                <td style="padding: 8px; border-bottom: 1px solid #eeeeee; color: #666666;">${amount} ${currency}</td>
            </tr>
            <tr>
                <td style="padding: 8px; border-bottom: 1px solid #eeeeee; font-weight: bold; color: #333333;">Reference:</td>
                <td style="padding: 8px; border-bottom: 1px solid #eeeeee; color: #666666;">${referenceNumber}</td>
            </tr>
        </table>
        <hr style="border: 0; border-top: 1px solid #eeeeee; margin: 20px 0;">
        <p style="font-size: 12px; color: #999999; text-align: center;">This is an automated email. Please do not reply.</p>
    </div>
</body>
</html>
