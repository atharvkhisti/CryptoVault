version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    networks:
      - cryptovault-network

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8083 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: always
    networks:
      - cryptovault-network

  wallet-service:
    build:
      context: ./backend
      dockerfile: wallet-service/Dockerfile
    container_name: wallet-service
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: always
    networks:
      - cryptovault-network

  transaction-service:
    build:
      context: ./backend
      dockerfile: transaction-service/Dockerfile
    container_name: transaction-service
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - WALLET_SERVICE_HOST=${WALLET_SERVICE_HOST}
    depends_on:
      postgres-db:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8082 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: always
    networks:
      - cryptovault-network

  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8084 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: always
    networks:
      - cryptovault-network

  risk-service:
    build:
      context: ./backend
      dockerfile: risk-service/Dockerfile
    container_name: risk-service
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - WALLET_SERVICE_HOST=${WALLET_SERVICE_HOST}
      - TRANSACTION_SERVICE_HOST=${TRANSACTION_SERVICE_HOST}
      - AUDIT_SERVICE_HOST=${AUDIT_SERVICE_HOST}
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8085 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: always
    networks:
      - cryptovault-network

  audit-service:
    build:
      context: ./backend
      dockerfile: audit-service/Dockerfile
    container_name: audit-service
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8086 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: always
    networks:
      - cryptovault-network

  kyc-service:
    build:
      context: ./backend
      dockerfile: kyc-service/Dockerfile
    container_name: kyc-service
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - AUDIT_SERVICE_HOST=${AUDIT_SERVICE_HOST}
      - AUTH_SERVICE_HOST=${AUTH_SERVICE_HOST}
      - NOTIFICATION_SERVICE_HOST=${NOTIFICATION_SERVICE_HOST}
    volumes:
      - kyc-uploads:/app/uploads
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8087 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: always
    networks:
      - cryptovault-network

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_HOST=${AUTH_SERVICE_HOST}
      - WALLET_SERVICE_HOST=${WALLET_SERVICE_HOST}
      - TRANSACTION_SERVICE_HOST=${TRANSACTION_SERVICE_HOST}
      - NOTIFICATION_SERVICE_HOST=${NOTIFICATION_SERVICE_HOST}
      - RISK_SERVICE_HOST=${RISK_SERVICE_HOST}
      - AUDIT_SERVICE_HOST=${AUDIT_SERVICE_HOST}
      - KYC_SERVICE_HOST=${KYC_SERVICE_HOST}
    depends_on:
      auth-service:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      risk-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
      kyc-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: always
    networks:
      - cryptovault-network

  frontend:
    build:
      context: ./frontend/web-app
      dockerfile: Dockerfile
    container_name: web-frontend
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: always
    networks:
      - cryptovault-network

  sonarqube-db:
    image: postgres:15-alpine
    container_name: sonarqube-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar_pass
    volumes:
      - sonar-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    networks:
      - cryptovault-network

  sonarqube:
    image: sonarqube:10.3-community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar_pass
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/sonar
    depends_on:
      sonarqube-db:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: always
    networks:
      - cryptovault-network

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    ports:
      - "8088:8080"
      - "50000:50000"
    user: root
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    networks:
      - cryptovault-network

volumes:
  pg-data:
  kyc-uploads:
  sonar-db-data:
  jenkins-data:

networks:
  cryptovault-network:
    driver: bridge


